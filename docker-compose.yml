version: '3.8'

services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: blcu_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-blcu_reading}
      MYSQL_USER: ${DB_USER:-blcu_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blcu_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - blcu_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blcu_backend
    restart: always
    environment:
      - DEBUG=${DEBUG:-True}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-secret-key-here}
      - DB_NAME=${DB_NAME:-blcu_reading}
      - DB_USER=${DB_USER:-blcu_user}
      - DB_PASSWORD=${DB_PASSWORD:-blcu_password}
      - DB_HOST=db
      - DB_PORT=3306
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blcu_network
    command: >
      sh -c "
        python manage.py migrate auth &&
        python manage.py migrate users &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

  # React 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blcu_frontend
    restart: always
    networks:
      - blcu_network

  # Nginx 反向代理
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: blcu_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - media_files:/app/media:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    networks:
      - blcu_network

volumes:
  mysql_data:
  media_files:
  static_files:

networks:
  blcu_network:
    driver: bridge
